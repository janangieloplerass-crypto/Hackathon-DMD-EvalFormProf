<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean Account Login</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card: rgba(255, 255, 255, 0.95);
            --text: #1f2937;
            --muted: #6b7280;
            --border: rgba(255, 255, 255, 0.2);
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.1);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            padding: 40px 40px 32px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        }

        .card-header h1 {
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-header p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
        }

        .login-form {
            padding: 40px;
        }

        .field-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        label {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px var(--accent-soft);
            transform: translateY(-1px);
        }

        .actions {
            margin-top: 32px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .login-form {
                padding: 32px 24px;
            }
            .card-header {
                padding: 32px 24px 24px;
            }
        }

        .credentials {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #166534;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h1>Dean Login</h1>
                <p>Enter your account details to access evaluation system</p>
            </div>

            <div class="credentials">
                <strong>Demo Credentials:</strong><br>
                Account Name: <code>d001</code><br>
                Code: <code>dean123</code>
            </div>

            <form id="loginForm" class="login-form" method="POST" action="dean_login.php">
                <div id="errorMsg" class="error" style="display: none;">
                    Invalid account name or code. Please try again.
                </div>

                <div class="field-group">
                    <label for="account_name">Account Name</label>
                    <input type="text" id="account_name" name="account_name" required autocomplete="off" placeholder="Enter account name">
                </div>

                <div class="field-group">
                    <label for="code">Code</label>
                    <input type="password" id="code" name="code" required autocomplete="off" placeholder="Enter access code">
                </div>

                <div class="actions">
                    <button type="submit" id="loginBtn">
                        <span class="loading" id="loadingSpinner" style="display: none;"></span>
                        Access System
                    </button>
                </div>

                <a href="index.html" class="back-link">← Back to Dashboard</a>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const spinner = document.getElementById('loadingSpinner');

        form.addEventListener('submit', function() {
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btn.innerHTML = '';
        });
    </script>
</body>
</html>
