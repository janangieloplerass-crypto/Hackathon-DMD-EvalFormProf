<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Column</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
            width: 200px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .button:hover {
            background-color: #45a049;
        }
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
    </style>

</head>
<body>
    <div id="splash-screen">
        <div class="spinner"></div>
        <h1 style="color: white; font-size: 2em; margin: 0;">Welcome</h1>
        <p style="color: rgba(255,255,255,0.8); margin: 10px 0;">Loading Evaluation System...</p>
    </div>
    <div class="button-container hidden">
        <a href="#" class="button" onclick="showLoading('student.html')">Student</a>
        <a href="#" class="button" onclick="showLoading('program_head_account.html')">Program Head</a>
<a href="#" class="button" onclick="showLoading('dean_account.html')">Dean</a>
<!-- Admin button removed -->
    </div>

    <script>
        window.addEventListener('load', function() {
            const splashScreen = document.getElementById('splash-screen');
            setTimeout(() => {
                splashScreen.classList.add('hidden');
                document.querySelector('.button-container').classList.remove('hidden');
            }, 2000);
        });


        async function showLoading(url) {
            const splashScreen = document.getElementById('splash-screen');
            const buttonContainer = document.querySelector('.button-container');
            const spinner = document.querySelector('.spinner');
            
            splashScreen.classList.remove('hidden');
            buttonContainer.classList.add('hidden');
            spinner.style.display = 'block';
            
            try {
                // Simulate async loading (2 seconds)
                await new Promise(resolve => setTimeout(resolve, 800));
                window.location.href = url;
            } catch (error) {
                console.error('Loading error:', error);
                window.location.href = url;
            }
        }

    </script>

</body>
</html>
