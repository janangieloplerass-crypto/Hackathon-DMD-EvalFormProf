    <script>
        function switchTab(tabId) {
            // Hide all panels
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            // Remove active from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Show selected panel
            document.getElementById(tabId).classList.add('active');
            // Activate button
            event.target.classList.add('active');
        }

        // Generalized professor loader and student validation
        document.addEventListener('DOMContentLoaded', function() {
            // Professor dropdowns for dean, program-head
            ['dean', 'program-head'].forEach(tabSuffix => {
                const deptSelect = document.getElementById(`department-${tabSuffix}`);
                const profSelect = document.getElementById(`professor-${tabSuffix}`);
                if (deptSelect && profSelect) {
                    deptSelect.addEventListener('change', () => loadProfessors(profSelect, deptSelect.value));
                }
            });

            // Professor dropdowns for dean, program-head remain functional
        });

        function loadProfessors(profSelect, dept) {
            if (!dept) return;
            fetch(`data/professors.php?dept=${encodeURIComponent(dept)}`)
                .then(r => r.json())
                .then(profs => {
                    profSelect.innerHTML = '<option value="" disabled selected>Select Professor</option>';
                    profs.forEach(prof => {
                        const opt = document.createElement('option');
                        opt.value = prof.name;
                        opt.textContent = prof.name;
                        profSelect.appendChild(opt);
                    });
                }).catch(err => console.error('Prof load error:', err));
        }
    </script>
