<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d1d5db;
            --accent: #1d4ed8;
            --accent-soft: #dbeafe;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--card);
            color: var(--text);
            padding: 24px;
            height: 100vh;
            overflow: auto;
        }

        form {
            max-width: 960px;
            margin: 0 auto;
        }

        fieldset {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            margin: 0 0 20px 0;
            padding: 18px;
        }

        legend {
            padding: 0 8px;
            font-weight: 700;
        }

        .scale-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(90px, 1fr));
            gap: 10px;
        }

        .scale-option {
            position: relative;
        }

        .scale-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .scale-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 92px;
            padding: 12px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: 600;
            background: #fff;
        }

        .scale-option span {
            display: block;
        }

        .scale-option .score {
            font-size: 20px;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .scale-option .meaning {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        .scale-option input:checked + label {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        .scale-option input:focus + label {
            outline: 3px solid rgba(29, 78, 216, 0.2);
        }

        .actions {
            margin-top: 28px;
            text-align: right;
        }

        .submit-btn {
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 24px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1e40af;
        }

        @media (max-width: 700px) {
            .scale-grid { grid-template-columns: 1fr; }
            body { padding: 18px; }
        }
    </style>
</head>
