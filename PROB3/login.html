            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);

        .field-group {
            display: flex;
            flex-direction: column;

        }

        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .actions {

        .loading {

<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h1>Program Head Login</h1>
                <p>Enter your credentials to access the evaluation system</p>
            </div>

            <form id="loginForm" class="login-form" method="POST" action="login.php">
                <?php if (isset($_GET['error'])): ?>
                    <div class="error">
                        Invalid username or password. Please try again.
                    </div>
                <?php endif; ?>

                <div class="field-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <div class="actions">
                    <button type="button" onclick="window.location.href='index.html'" style="background: #6b7280;">Back</button>
                    <button type="submit" id="loginBtn">
                        <span class="loading" id="loadingSpinner" style="display: none;"></span>
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loadingSpinner');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btn.innerHTML = 'Logging in...';
        });
    </script>
</body>
</html>
